<!DOCTYPE html>
<head>
<style>
.bg,
.fg
{
    position: fixed ;
    top: 0 ;
    left: 0 ;
    width: 100% ;
    height: 100% ;
    z-index: 1 ;
}

.fg
{
    width: 50% ;
    z-index: 3 ;
}

.bg > img,
.fg > img
{
    display: block ;
    width: 100% ;
    height: 100% ;
    object-fit: cover ;
}

.fg > img
{
    max-width: 80% ;
    max-height: 80% ;
    object-fit: contain ;
    position: absolute ;
    top: 50% ;
    left: 50% ;
    transform: translate(-50%, -50%) ;
}

.tracks
{
    position: relative ;
    margin-left: 50% ;
    padding: 5% ;
    z-index: 3 ;
    list-style: inside none ;
    display: block ;
}

.tracks audio
{
    display: block ;
    width: 100% ;
    margin-top: 1em ;
}

.tracks li
{
    background: rgba(0, 0, 0, .5) ;
    padding: 1em ;
    color: #fff ;
}

.tracks button
{
    margin-right: 1em ;
}

.tracks li:not(:first-child)
{
    margin-top: 1em ;
}

progress
{
    position: fixed ;
    top: 0 ;
    left: 0 ;
    right: 0 ;
    width: 100% ;
    height: 100% ;
    appearance: none ;
    -webkit-appearance: none ;
    opacity: .1 ;
    z-index: 2;
    transition: opacity 1s ease-in-out ;
}

progress[value="1"]
{
    opacity: 0 ;
    pointer-events: none ;
}

audio
{
    position: fixed ;
    bottom: 5% ;
    left: 5% ;
    right: 5% ;
    display: block ;
    width: 90% ;
    z-index: 4 ;
}

async function BlobUrlFromTorrent(path) {
    return await new Promise(async (yup, nope) => {
        const files = {};

        console.log('awaiting torrent metadata for ' + path);

        (await zelda25_torrent).files.forEach((file) => {
            files[file.path.replace(zelda25_torrent.name, '')] = file;
        });

        console.log('awaiting blob url for ' + path);

        files[path].getBlobURL((err, url) => {
            if (err) {
                nope(err);
            } else {
                yup(url);
            }
        });
    });
};

async function RaceToBlobUrl(path) {
    if (FILE_PATH_IN_IPFS.includes(path)) {
        return await Promise.race([
            /*
            fetch(
                'https://cloudflare-ipfs.com/ipfs/' + ZELDA25_IPFS[path]
            ).then((r) => {
                return r.blob();
            }).then((blob) => {

                return URL.createObjectURL(blob);
            }),
            fetch(
                'https://ipfs.io/ipfs/' + ZELDA25_IPFS[path]
            ).then((r) => {
                return r.blob();
            }).then((blob) => {
                console.log('ipfs gateway');
                return URL.createObjectURL(blob);
            }),
            */
            BlobUrlFromTorrent(path),
            ipfs_node.then(async (ipfs_node) => {
                const ipfs_cat = await ipfs_node.cat(
                    ZELDA25_IPFS[path]
                );

                const buffs = [];

                for await (const buff of ipfs_cat) {
                    buffs.push(buff);
                }

                console.log('js-ipfs');
                return URL.createObjectURL(new Blob(buffs));
            })
        ]);
    }

    console.log('not in ipfs list, getting via torrent: ' + path);

    return await BlobUrlFromTorrent(path);
};
